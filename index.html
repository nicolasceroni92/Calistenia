// ── TIMER UTILITIES ──────────────────────────────────
function parseVolume(vol) {
  // "4×25\"" → { sets: 4, isTime: true, seconds: 25 }
  // "5×8"    → { sets: 5, isTime: false, reps: 8 }
  // "3×3-5\"" → { sets: 3, isTime: true, seconds: 5 }
  // "4×10\"" → { sets: 4, isTime: true, seconds: 10 }
  if (!vol) return null;
  const m = vol.match(/(\d+)×(\d+)(?:-(\d+))?(["])?/);
  if (!m) {
    // formati tipo "30 sec", "1 min", "10 rip." dei warmup
    const tSec = vol.match(/(\d+)\s*sec/);
    if (tSec) return { sets: 1, isTime: true, seconds: parseInt(tSec[1], 10) };
    const tMin = vol.match(/(\d+)\s*min/);
    if (tMin) return { sets: 1, isTime: true, seconds: parseInt(tMin[1], 10) * 60 };
    const tRange = vol.match(/(\d+)\s*per\s*(?:senso|lato)/);
    if (tRange) return null;
    return null;
  }
  const sets = parseInt(m[1], 10);
  const hasQuote = !!m[4];
  if (hasQuote) {
    const seconds = m[3] ? parseInt(m[3], 10) : parseInt(m[2], 10);
    return { sets, isTime: true, seconds };
  }
  return { sets, isTime: false, reps: parseInt(m[2], 10) };
}

function parseSimpleTime(timeStr) {
  // "1 min" → 60, "30 sec" → 30, "30 sec per lato" → 30 (×2 sides? troppo complesso, lasciamo 30)
  if (!timeStr) return null;
  const tMin = timeStr.match(/(\d+)\s*min/);
  if (tMin) return parseInt(tMin[1], 10) * 60;
  const tSec = timeStr.match(/(\d+)\s*sec/);
  if (tSec) return parseInt(tSec[1], 10);
  const tQuote = timeStr.match(/(\d+)["]/);
  if (tQuote) return parseInt(tQuote[1], 10);
  return null;
}

function beep(freq = 880, duration = 80, volume = 0.15) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = freq;
    osc.type = "sine";
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration / 1000);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration / 1000);
    setTimeout(() => ctx.close(), duration + 100);
  } catch (e) {}
}

function speak(text) {
  try {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "it-IT";
    u.rate = 1.1;
    u.volume = 0.9;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}

function ExerciseTimer({ exerciseKey, totalSets, secondsPerSet, isTime, priority, restSeconds, reps }) {
  // UI a pipeline orizzontale: [Serie 1] → [pausa] → [Serie 2] → [pausa] → ...
  // Stati per ogni serie: pending | active-prep | active-work | active-rest | done
  // Stati globali della singola fase attiva
  const [activeIdx, setActiveIdx] = useState(null); // indice serie in corso
  const [phase, setPhase] = useState("idle"); // idle | prep | work | rest | done
  const [remaining, setRemaining] = useState(0);
  const [completedSets, setCompletedSets] = useState(new Array(totalSets).fill(false));
  const [completedRests, setCompletedRests] = useState(new Array(totalSets).fill(false));

  // Tick countdown
  useEffect(() => {
    if (phase === "idle" || phase === "done") return;
    if (remaining <= 0) {
      if (phase === "prep") {
        beep(1320, 200, 0.2);
        setPhase("work");
        setRemaining(secondsPerSet || 0);
        speak("Via");
        return;
      }
      if (phase === "work") {
        beep(1320, 400, 0.3);
        const newSets = [...completedSets];
        newSets[activeIdx] = true;
        setCompletedSets(newSets);
        const allDone = newSets.every(s => s);
        if (allDone) {
          setPhase("done");
          setActiveIdx(null);
          speak("Finito");
        } else if (restSeconds) {
          setPhase("rest");
          setRemaining(restSeconds);
          speak("Recupero");
        } else {
          setPhase("idle");
          setActiveIdx(null);
        }
        return;
      }
      if (phase === "rest") {
        beep(1320, 300, 0.25);
        const newRests = [...completedRests];
        newRests[activeIdx] = true;
        setCompletedRests(newRests);
        setPhase("idle");
        setActiveIdx(null);
        speak("Pronto");
        return;
      }
    }
    const t = setTimeout(() => {
      setRemaining(r => r - 1);
      const r = remaining - 1;
      // Voce negli ultimi 5 secondi di QUALSIASI fase
      if (r >= 1 && r <= 5) {
        speak(String(r));
      }
      if (phase === "work") {
        beep(660, 50, 0.08);
        // Voce anche ogni 5 sec sopra i 5 (per dare scansione del tempo)
        if (r > 5 && r % 5 === 0) speak(String(r));
      } else if (phase === "prep") {
        if (remaining <= 5) beep(880, 80, 0.15);
      } else if (phase === "rest") {
        if (remaining <= 5 && remaining > 0) beep(880, 80, 0.15);
      }
    }, 1000);
    return () => clearTimeout(t);
  }, [phase, remaining]);

  // Click su una serie
  const handleSetClick = (i) => {
    // Se la serie è già completata → toggle off
    if (completedSets[i]) {
      const newSets = [...completedSets];
      newSets[i] = false;
      setCompletedSets(newSets);
      return;
    }
    // Se siamo in mezzo a una fase, ignora
    if (phase !== "idle" && phase !== "done") return;

    if (isTime) {
      setActiveIdx(i);
      setPhase("prep");
      setRemaining(10);
      speak("Pronto");
    } else {
      // Esercizio a reps → conferma + parte pausa (se non è l'ultima)
      beep(1320, 400, 0.3);
      const newSets = [...completedSets];
      newSets[i] = true;
      setCompletedSets(newSets);
      const allDone = newSets.every(s => s);
      if (allDone) {
        setPhase("done");
        speak("Finito");
      } else if (restSeconds) {
        setActiveIdx(i);
        setPhase("rest");
        setRemaining(restSeconds);
        speak("Recupero");
      }
    }
  };

  // Stop globale
  const stop = () => {
    setPhase("idle");
    setRemaining(0);
    setActiveIdx(null);
    if (window.speechSynthesis) window.speechSynthesis.cancel();
  };

  // Reset
  const reset = () => {
    stop();
    setCompletedSets(new Array(totalSets).fill(false));
    setCompletedRests(new Array(totalSets).fill(false));
  };

  const formatTime = (s) => {
    if (s >= 60) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m}:${String(sec).padStart(2, "0")}`;
    }
    return `${s}`;
  };

  const setLabel = isTime ? `${secondsPerSet}"` : (reps != null ? `${reps}` : "");

  // Costruisco la pipeline: [Serie1] [Pause1] [Serie2] [Pause2] ... [SerieN]
  // Pause solo tra serie (N serie → N-1 pause)
  const items = [];
  for (let i = 0; i < totalSets; i++) {
    items.push({ type: "set", idx: i });
    if (i < totalSets - 1) {
      items.push({ type: "rest", idx: i }); // pausa che segue la serie i
    }
  }

  const renderSet = (i) => {
    const done = completedSets[i];
    const isActiveSet = activeIdx === i && (phase === "prep" || phase === "work");
    let bg, border, color, text;
    if (done) {
      bg = ACCENT; border = ACCENT; color = "#0B0C0F"; text = "✓";
    } else if (isActiveSet) {
      if (phase === "prep") {
        bg = "#f0c43022"; border = "#f0c430"; color = "#f0c430";
        text = formatTime(remaining);
      } else {
        bg = `${ACCENT2}22`; border = ACCENT2; color = ACCENT2;
        text = isTime ? formatTime(remaining) : setLabel;
      }
    } else {
      bg = "transparent"; border = MUTED; color = MUTED; text = setLabel;
    }
    return (
      <button
        key={`s${i}`}
        onClick={() => handleSetClick(i)}
        style={{
          width: 52, height: 44,
          background: bg, border: `2px solid ${border}`, borderRadius: 4,
          color: color,
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: 15, fontWeight: 700,
          cursor: "pointer",
          display: "flex", alignItems: "center", justifyContent: "center",
          flexShrink: 0,
          padding: 0,
        }}
        title={`Serie ${i + 1} di ${totalSets}`}
      >{text}</button>
    );
  };

  const renderRest = (i) => {
    const isActiveRest = activeIdx === i && phase === "rest";
    const restDone = completedRests[i] || completedSets[i + 1];
    let color, text;
    if (isActiveRest) {
      color = "#2563eb";
      text = formatTime(remaining);
    } else if (restDone) {
      color = MUTED;
      text = "·";
    } else {
      color = MUTED;
      text = "2′";
    }
    return (
      <div key={`r${i}`} style={{
        display: "flex", alignItems: "center", gap: 4,
        color: color,
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 11,
        flexShrink: 0,
      }}>
        <span style={{ fontSize: 13 }}>→</span>
        <span>{text}</span>
        <span style={{ fontSize: 13 }}>→</span>
      </div>
    );
  };

  return (
    <div style={{ marginTop: 8, padding: "12px", background: "rgba(0,0,0,0.25)", border: `1px solid ${BORDER}`, borderRadius: 5 }}>
      {/* Pipeline verticale: quadrato → freccia + tempo → quadrato → ... */}
      <div style={{ display: "flex", alignItems: "stretch", gap: 12 }}>
        {/* Colonna sinistra: quadrati e frecce */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 0 }}>
          {items.map((item, idx) => {
            if (item.type === "set") {
              return renderSet(item.idx);
            }
            // Riga "freccia + tempo" tra serie
            const isActiveRest = activeIdx === item.idx && phase === "rest";
            const restDone = completedRests[item.idx] || completedSets[item.idx + 1];
            let color, text;
            if (isActiveRest) {
              color = "#2563eb";
              text = formatTime(remaining);
            } else if (restDone) {
              color = MUTED;
              text = "·";
            } else {
              color = MUTED;
              text = "2′";
            }
            return (
              <div key={`r${item.idx}`} style={{
                display: "flex", alignItems: "center", gap: 8,
                color: color,
                fontFamily: "'JetBrains Mono', monospace",
                fontSize: 13,
                paddingLeft: 14, // centra la freccia sotto il quadrato (quadrato min 44px, padding centra ~)
                height: 32,
              }}>
                <span style={{ fontSize: 18, lineHeight: 1 }}>↓</span>
                <span style={{ fontSize: 12, minWidth: 36 }}>{text}</span>
              </div>
            );
          })}
        </div>

        {/* Colonna destra: stato corrente e controlli */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", gap: 6, minWidth: 0 }}>
          {phase === "idle" && !completedSets.some(s => s) && (
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: MUTED, letterSpacing: 0.5, lineHeight: 1.4 }}>
              {isTime ? "tocca una serie per avviare il timer" : "tocca quando hai fatto la serie"}
            </span>
          )}
          {phase === "prep" && (
            <>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, fontWeight: 700, color: "#f0c430", letterSpacing: 1.5 }}>
                PREPARAZIONE
              </span>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: MUTED }}>
                serie {activeIdx + 1}/{totalSets}
              </span>
            </>
          )}
          {phase === "work" && (
            <>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, fontWeight: 700, color: ACCENT2, letterSpacing: 1.5 }}>
                LAVORO
              </span>
              <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: MUTED }}>
                serie {activeIdx + 1}/{totalSets}
              </span>
            </>
          )}
          {phase === "done" && (
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 700, color: "#16a35a", letterSpacing: 1.5 }}>
              ✓ COMPLETATO
            </span>
          )}

          {(phase === "prep" || phase === "work" || phase === "rest") && (
            <button onClick={stop} style={{
              alignSelf: "flex-start", marginTop: 4,
              background: "transparent", color: ACCENT2, border: `1px solid ${ACCENT2}`,
              padding: "4px 10px", borderRadius: 3,
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 10, fontWeight: 700, letterSpacing: 1,
              cursor: "pointer", textTransform: "uppercase",
            }}>■ Stop</button>
          )}

          {(completedSets.some(s => s) || phase !== "idle") && phase !== "prep" && phase !== "work" && phase !== "rest" && (
            <button onClick={reset} title="Reset" style={{
              alignSelf: "flex-start",
              padding: "3px 8px",
              background: "transparent", border: `1px solid ${MUTED}`,
              borderRadius: 3, color: MUTED,
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 10, cursor: "pointer",
            }}>↻ RESET</button>
          )}
        </div>
      </div>
    </div>
  );
}

function YTLink({ search, size = "normal" }) {
  return (
    <a
      href={yt(search)}
      target="_blank"
      rel="noopener noreferrer"
      onClick={(e) => e.stopPropagation()}
      className="yt-btn"
      title={`Cerca "${search}" su YouTube`}
      style={{ width: size === "small" ? 20 : 22, height: size === "small" ? 16 : 18 }}
    >
      ▶
    </a>
  );
}

function Tag({ children, color = ACCENT, bg }) {
  return (
    <span style={{
      display: "inline-block",
      padding: "2px 8px",
      borderRadius: 3,
      fontSize: 10,
      fontFamily: "'JetBrains Mono', monospace",
      fontWeight: 700,
      letterSpacing: 0.5,
      color,
      background: bg || `${color}18`,
      border: `1px solid ${color}28`,
    }}>{children}</span>
  );
}

function SectionLabel({ children, icon }) {
  return (
    <div style={{
      display: "flex",
      alignItems: "center",
      gap: 8,
      marginBottom: 10,
    }}>
      {icon && <span style={{ fontSize: 13 }}>{icon}</span>}
      <span style={{
        fontFamily: "'JetBrains Mono', monospace",
        fontSize: 9,
        fontWeight: 700,
        letterSpacing: 2.5,
        textTransform: "uppercase",
        color: MUTED,
      }}>{children}</span>
      <div style={{ flex: 1, height: 1, background: BORDER }} />
    </div>
  );
}

                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, color: ACCENT2 }}>{s.current}</span>
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: MUTED, paddingTop: 2 }}>Target</span>
                    <span style={{ color: TEXT }}>{s.target}</span>
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: MUTED, paddingTop: 2 }}>Poi</span>
                    <span style={{ color: "#16a35a", fontStyle: "italic" }}>{s.next}</span>
                  </div>
                  <div className="skill-bar-bg">
                    <div className="skill-bar-fill" style={{ width: `${30 + i * 8}%` }} />
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── PROGRESSIONI ── */}
        {active === "prog" && (
          <div className="fade-up">
            <div style={{ padding: "28px 0 20px", borderBottom: `1px solid ${BORDER}`, marginBottom: 24 }}>
              <div style={{ fontSize: 30, fontWeight: 900, textTransform: "uppercase", marginBottom: 4 }}>Criteri di Progressione</div>
              <div style={{ fontSize: 14, color: MUTED, fontFamily: "'JetBrains Mono', monospace" }}>Avanza solo quando soddisfi il criterio</div>
            </div>
            <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 6, overflow: "hidden" }}>
              {progressions.map(([from, criteria], i) => (
                <div key={i} style={{
                  padding: "14px 16px",
                  borderBottom: i < progressions.length - 1 ? `1px solid rgba(255,255,255,0.04)` : "none",
                  display: "flex",
                  gap: 12,
                  alignItems: "flex-start",
                }}>
                  <div style={{
                    flexShrink: 0,
                    width: 22, height: 22,
                    background: `${ACCENT}18`,
                    border: `1px solid ${ACCENT}30`,
                    borderRadius: 3,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontFamily: "'JetBrains Mono', monospace",
                    fontSize: 10, fontWeight: 700,
                    color: ACCENT,
                    marginTop: 1,
                  }}>{String(i + 1).padStart(2, "0")}</div>
                  <div>
                    <div style={{ fontWeight: 800, fontSize: 15, textTransform: "uppercase", letterSpacing: 0.3, marginBottom: 4 }}>{from}</div>
                    <div style={{ display: "flex", alignItems: "flex-start", gap: 6, fontSize: 13, color: MUTED, fontFamily: "'JetBrains Mono', monospace" }}>
                      <span style={{ color: "#16a35a", flexShrink: 0 }}>✓</span>
                      <span>{criteria}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

<script>
// Service worker disabilitato in versione single-file (niente offline, ma app installabile)

// Sblocca audio context al primo tap (necessario per beep su mobile)
let audioUnlocked = false;
document.addEventListener("touchstart", () => {
  if (audioUnlocked) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    gain.gain.value = 0;
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.01);
    audioUnlocked = true;
  } catch (e) {}
}, { once: true });

// Wake Lock — tiene lo schermo acceso quando l'app è in primo piano
window.__wakeLockState = {
  supported: "wakeLock" in navigator,
  active: false,
  error: null,
};

let wakeLock = null;

function updateWakeLockUI() {
  const el = document.getElementById("wakelock-indicator");
  if (!el) return;
  const s = window.__wakeLockState;
  if (!s.supported) {
    el.textContent = "⚠ schermo: non supportato";
    el.style.color = "#FF4D6D";
  } else if (s.active) {
    el.textContent = "● schermo sempre attivo";
    el.style.color = "#C8F542";
  } else if (s.error) {
    el.textContent = "⚠ schermo: " + s.error;
    el.style.color = "#FF4D6D";
  } else {
    el.textContent = "○ schermo: tocca per attivare";
    el.style.color = "#f0c430";
  }
}

async function requestWakeLock() {
  if (!("wakeLock" in navigator)) {
    window.__wakeLockState.supported = false;
    updateWakeLockUI();
    return;
  }
  try {
    wakeLock = await navigator.wakeLock.request("screen");
    window.__wakeLockState.active = true;
    window.__wakeLockState.error = null;
    updateWakeLockUI();
    wakeLock.addEventListener("release", () => {
      window.__wakeLockState.active = false;
      updateWakeLockUI();
    });
  } catch (e) {
    window.__wakeLockState.active = false;
    window.__wakeLockState.error = (e && e.message) ? e.message : "negato";
    updateWakeLockUI();
  }
}

// Lo attivo al primo tap (richiesto da Chrome per essere considerato user gesture)
document.addEventListener("touchstart", requestWakeLock, { once: true });
document.addEventListener("click", requestWakeLock, { once: true });

// Lo riattivo quando l'app torna in primo piano
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && !window.__wakeLockState.active) {
    requestWakeLock();
  }
});

// HEARTBEAT: ogni 15 sec verifica che il wake lock sia ancora attivo,
// altrimenti lo riattiva. Risolve il problema del TWA Android che lo rilascia silenziosamente.
setInterval(() => {
  if (document.visibilityState !== "visible") return;
  // Se il wakeLock è null, rilasciato, o lo stato segna inattivo → riprova
  if (!wakeLock || wakeLock.released || !window.__wakeLockState.active) {
    requestWakeLock();
  }
}, 15000);

// Aggiorno la UI ogni secondo per sicurezza (al caso il componente React non sia ancora montato)
setInterval(updateWakeLockUI, 1000);
</script>
